<!--
    Amazon Q prompt used:
    "Update mycharts.html to use my Genshin Impact character roster data. Create a pie chart
    showing number of characters per element, and a bar chart showing average character level
    per element. Elements are: pyro, hydro, dendro, electro, anemo, cryo, geo.
    Copy as much of the original piechart.html code as possible, even if it is not the best option."
  -->
<html>
  <head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

<script>
     google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {

        var data = google.visualization.arrayToDataTable([
          ['Element', 'Number of Characters'],
          ['Pyro',     13],
          ['Hydro',    10],
          ['Dendro',    7],
          ['Electro',  14],
          ['Anemo',    13],
          ['Cryo',     12],
          ['Geo',       8]
        ]);

        var options = {
          title: 'Characters per Element',
          pieSliceText: 'label',
          slices: {  
                     1: {offset: 0.2}
                     
                    
          },
        };

        var chart = new google.visualization.PieChart(document.getElementById('piechart'));

        chart.draw(data, options);

        var data2 = google.visualization.arrayToDataTable([
          ['Element', 'Average Character Level'],
          ['Pyro',     60],
          ['Hydro',    69],
          ['Dendro',   54],
          ['Electro',  60],
          ['Anemo',    54],
          ['Cryo',     54],
          ['Geo',      69]
        ]);

        var options2 = {
          title: 'Average Character Level per Element',
          slices: {  
                     1: {offset: 0.2}
                     
                    
          },
        };

        var chart2 = new google.visualization.BarChart(document.getElementById('barchart'));

        chart2.draw(data2, options2);
      }
    </script>
  </head>
  <body>
    <div style="display: flex; flex-direction: row;">
      <div id="piechart" style="width: 900px; height: 500px;"></div>
      <div id="barchart" style="width: 900px; height: 500px;"></div>
    </div>
    <div id="piechart_3d" style="width: 1350px; height: 750px;"></div>
  </body>
</html>
